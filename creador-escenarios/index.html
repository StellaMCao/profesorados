<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactividad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto:wght@400;700&family=Lato:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

<body>
    <div id="app-container">
        \x3C!-- Backgrounds injected here -->
        <div id="bg-layer"></div>
        
        \x3C!-- Buttons injected here -->

        <div id="start-overlay">
            <h1 id="start-title">Interactividad Lista</h1>
            <p id="start-subtitle" style="display:none; margin:8px 0 4px; opacity:0.85; font-size:1.1em;"></p>
            <p id="start-description" style="display:none; margin:10px auto 18px; max-width:560px; opacity:0.75; font-size:0.95em; white-space:pre-wrap; line-height:1.6;"></p>
            <button class="start-btn" id="start-btn" onclick="startApp()">Comenzar</button>
            <p id="start-footer" style="display:none; margin-top:18px; opacity:0.45; font-size:0.75em;"></p>
        </div>

        <div id="score-display" style="display:none; position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.6); color:gold; padding:10px 20px; border-radius:30px; font-weight:bold; font-size:1.2rem; z-index:100; border:2px solid gold; pointer-events:none; transition: transform 0.2s;">

        </div>

            <div style="background:#fff; color:#0f172a; padding:40px; border-radius:12px; max-width:80%; text-align:center; font-size:1.5rem; position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.5);">
                <button id="close-popup" style="position:absolute; top:10px; right:15px; background:transparent; border:none; font-size:1.5rem; cursor:pointer; color:#64748b;">✖</button>
                <div id="popup-text" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    \x3C!-- Audio Player -->

    <audio id="global-audio-player" loop></audio>

    <script src="js/player.js"><\/script>

* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#app-container { width: 100vw; height: 100vh; max-width: calc(100vh * (16/9)); max-height: calc(100vw * (9/16)); aspect-ratio: 16/9; position: relative; background: #111; box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; margin: auto; }
.scene-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.trans-fade { opacity: 0; transition: opacity 0.8s ease-in-out; }
.trans-fade.active { opacity: 1; }
.trans-slide-up { transform: translateY(100%); transition: transform 0.8s ease-in-out; }
.trans-slide-up.active { transform: translateY(0); }
.trans-slide-down { transform: translateY(-100%); transition: transform 0.8s ease-in-out; }
.trans-slide-down.active { transform: translateY(0); }
.trans-slide-left { transform: translateX(100%); transition: transform 0.8s ease-in-out; }
.trans-slide-left.active { transform: translateX(0); }
.trans-slide-right { transform: translateX(-100%); transition: transform 0.8s ease-in-out; }
.trans-slide-right.active { transform: translateX(0); }
.trans-zoom-in { transform: scale(0.5); opacity: 0; transition: all 0.8s ease-in-out; }
.trans-zoom-in.active { transform: scale(1); opacity: 1; }
.trans-flip { transform: rotateY(90deg); opacity: 0; transition: all 0.8s ease-in-out; perspective: 1000px; }
.trans-flip.active { transform: rotateY(0deg); opacity: 1; }
.trans-blur { filter: blur(20px); opacity: 0; transition: all 0.8s ease-in-out; }
.trans-blur.active { filter: blur(0px); opacity: 1; }
.trans-none { opacity: 0; }
.trans-none.active { opacity: 1; transition: none; }
#buttons-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
#buttons-container.active { opacity: 1; }
.interactive-btn { position: absolute; pointer-events: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; text-align: center; }
.interactive-btn:hover { transform: scale(1.10); box-shadow: 0 0 0 3px rgba(255,255,255,0.35), 0 12px 40px rgba(0,0,0,0.4); }
.interactive-btn:active { transform: scale(0.96); transition: transform 0.08s; }
.glass-mode { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); color: white; border-radius: 12px; font-weight: 600; font-size: 1.2vw; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); white-space: pre-wrap; word-break: break-word; }
.glass-mode:hover { background: rgba(255, 255, 255, 0.25); box-shadow: 0 8px 32px 0 rgba(255,255,255,0.2); }
.img-mode { background: transparent; border: none; }
.img-mode img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); transition: filter 0.2s; }
.img-mode:hover img { filter: drop-shadow(0 6px 12px rgba(255,255,255,0.4)); }
.plain-mode { background: transparent; color: white; border: none; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
#start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
.start-btn { padding: 15px 30px; font-size: 1.5rem; background: #e94560; border: none; color: white; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
.start-btn:hover { background: #ff5277; }
@keyframes anim-fade-in { from { opacity:0; } to { opacity:1; } }
@keyframes anim-slide-left  { from { transform:translateX(-110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
